name: Deploy QGIS Plugin Repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Læs version fra metadata.txt
        id: meta
        run: |
          VERSION=$(grep '^version=' metadata.txt | cut -d'=' -f2)
          DESCRIPTION=$(grep '^description=' metadata.txt | cut -d'=' -f2)
          ABOUT=$(grep '^about=' metadata.txt | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "about=$ABOUT" >> $GITHUB_OUTPUT

      - name: Byg plugin-zip
        run: |
          mkdir -p dist/Jordprover
          # Kopiér alle plugin-filer (undtagen .github og dist)
          rsync -av --exclude='.github' --exclude='dist' --exclude='.git' \
            . dist/Jordprover/
          cd dist
          zip -r Jordprover.zip Jordprover/
          ZIP_SIZE=$(stat -c%s Jordprover.zip)
          echo "zip_size=$ZIP_SIZE" >> $GITHUB_ENV

      - name: Generér plugins.xml
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          DESCRIPTION="${{ steps.meta.outputs.description }}"
          ABOUT="${{ steps.meta.outputs.about }}"
          BASE_URL="https://${OWNER}.github.io/${REPO}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > dist/plugins.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
            <pyqgis_plugin name="Jordprover" version="${VERSION}">
              <description>${DESCRIPTION}</description>
              <about>${ABOUT}</about>
              <version>${VERSION}</version>
              <qgis_minimum_version>3.0</qgis_minimum_version>
              <homepage>${BASE_URL}</homepage>
              <file_name>Jordprover.zip</file_name>
              <icon>icon.png</icon>
              <author_name>${OWNER}</author_name>
              <download_url>${BASE_URL}/Jordprover.zip</download_url>
              <update_date>${DATE}</update_date>
              <experimental>False</experimental>
              <deprecated>False</deprecated>
              <tracker>https://github.com/${OWNER}/${REPO}/issues</tracker>
              <repository>https://github.com/${OWNER}/${REPO}</repository>
              <tags>jordprøver, grid, qfield</tags>
            </pyqgis_plugin>
          </plugins>
          EOF

      - name: Generér index.html
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          BASE_URL="https://${OWNER}.github.io/${REPO}"
          DATE=$(date +"%d.%m.%Y")

          cat > dist/index.html << EOF
          <!DOCTYPE html>
          <html lang="da">
          <head>
            <meta charset="UTF-8">
            <title>Jordprøver QGIS Plugin</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; color: #222; line-height: 1.6; }
              h1   { color: #2c7a2c; }
              code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.95em; }
              pre  { background: #f0f0f0; padding: 12px; border-radius: 5px; overflow-x: auto; }
              .url { word-break: break-all; }
            </style>
          </head>
          <body>
            <h1>Jordprøver QGIS Plugin</h1>
            <p>Version ${VERSION} &mdash; opdateret ${DATE}</p>
            <h2>Installation i QGIS</h2>
            <ol>
              <li>Åbn QGIS</li>
              <li>Gå til <strong>Plugins → Manage and Install Plugins → Settings</strong></li>
              <li>Klik <strong>Add</strong> under "Plugin Repositories"</li>
              <li>Indsæt denne URL:
                <pre class="url">${BASE_URL}/plugins.xml</pre>
              </li>
              <li>Gå til fanen <strong>All</strong> og søg efter <em>Jordprover</em></li>
              <li>Klik <strong>Install Plugin</strong></li>
            </ol>
            <h2>Direkte download</h2>
            <p><a href="Jordprover.zip">Jordprover.zip</a></p>
          </body>
          </html>
          EOF

      - name: Deploy til GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
